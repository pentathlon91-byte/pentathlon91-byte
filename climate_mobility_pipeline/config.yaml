azure:
  storage_account: "climate_mobility_pipeline"
  container: "climatemobility"
  connection_string_env: "AZURE_STORAGE_CONNECTION_STRING"

paths:
  local_base: "data/"
  local_raw: "data/raw/"
  local_processed: "data/processed/"
  local_curated: "data/curated/"

  raw:
    weather: "raw/weather/"
    mobility_external: "raw/mobility/external/"
    mobility_txt: "raw/mobility/txt/"
    traffic_stream: "raw/traffic_stream/"

  processed:
    weather: "processed/weather/"
    mobility: "processed/mobility/"
    traffic_stream: "processed/traffic_stream/"

  curated:
    mobility_weather: "curated/mobility_weather/"
    marts: "curated/marts/"

weather:
  api_url: "https://api.open-meteo.com/v1/forecast"
  latitude: 41.9028
  longitude: 12.4964
  hourly_params:
    - temperature_2m
    - precipitation
    - windspeed_10m
  timezone: "Europe/Rome"
  start_date: "2014-02-01"
  end_date: "2014-03-02"

mobility:
  month_processed: "taxi_february"
  azure:
    container_name: "climatemobility"
    blob_path: "raw/mobility/external/taxi_february.tar.gz"
  local:
    external_dir: "data/raw/mobility/external/"
    extracted_dir: "data/raw/mobility/txt/"
    archive_name: "taxi_february.tar.gz"

streaming:
  replay:
    start: "2014-02-01T00:00:00"
    end:   "2014-03-03T00:00:00"
    speed_multiplier: 3600
    interval_minutes: 1
  simulation:
    events_per_minute: 20
  kafka:
    bootstrap_servers: "localhost:9092"
    topic: "traffic_events"
